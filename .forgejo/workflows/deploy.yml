name: Deploy to Codeberg Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - uses: https://codeberg.org/actions/pages@v1
        with:
          directory: dist
